# FarmConnect Dependency Updates and Security Patches
# Automated dependency management and security vulnerability patching

name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update to perform'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - security

env:
  NODE_VERSION: '18'

jobs:
  # =============================================================================
  # SECURITY VULNERABILITY SCANNING
  # =============================================================================
  security-audit:
    name: Security Vulnerability Audit
    runs-on: ubuntu-latest
    
    outputs:
      backend-vulnerabilities: ${{ steps.audit-backend.outputs.vulnerabilities }}
      frontend-vulnerabilities: ${{ steps.audit-frontend.outputs.vulnerabilities }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend dependencies
        id: audit-backend
        working-directory: ./farmconnect-backend
        run: |
          npm audit --json > audit-backend.json || true
          VULNERABILITIES=$(cat audit-backend.json | jq '.metadata.vulnerabilities.total // 0')
          echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
          
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "🚨 Found $VULNERABILITIES vulnerabilities in backend dependencies"
            npm audit --audit-level=moderate
          else
            echo "✅ No vulnerabilities found in backend dependencies"
          fi

      - name: Audit frontend dependencies
        id: audit-frontend
        working-directory: ./farmconnect-frontend
        run: |
          npm audit --json > audit-frontend.json || true
          VULNERABILITIES=$(cat audit-frontend.json | jq '.metadata.vulnerabilities.total // 0')
          echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
          
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "🚨 Found $VULNERABILITIES vulnerabilities in frontend dependencies"
            npm audit --audit-level=moderate
          else
            echo "✅ No vulnerabilities found in frontend dependencies"
          fi

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            farmconnect-backend/audit-backend.json
            farmconnect-frontend/audit-frontend.json
          retention-days: 30

  # =============================================================================
  # DEPENDENCY UPDATES
  # =============================================================================
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    needs: [security-audit]
    if: |
      needs.security-audit.outputs.backend-vulnerabilities > 0 ||
      needs.security-audit.outputs.frontend-vulnerabilities > 0 ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Update backend dependencies
        working-directory: ./farmconnect-backend
        run: |
          echo "📦 Updating backend dependencies..."
          
          case "${{ inputs.update_type || 'security' }}" in
            "security")
              npm audit fix --force
              ;;
            "patch")
              npx npm-check-updates -u --target patch
              npm install
              ;;
            "minor")
              npx npm-check-updates -u --target minor
              npm install
              ;;
            "major")
              npx npm-check-updates -u
              npm install
              ;;
          esac

      - name: Update frontend dependencies
        working-directory: ./farmconnect-frontend
        run: |
          echo "📦 Updating frontend dependencies..."
          
          case "${{ inputs.update_type || 'security' }}" in
            "security")
              npm audit fix --force
              ;;
            "patch")
              npx npm-check-updates -u --target patch
              npm install
              ;;
            "minor")
              npx npm-check-updates -u --target minor
              npm install
              ;;
            "major")
              npx npm-check-updates -u
              npm install
              ;;
          esac

      - name: Run tests after updates
        run: |
          echo "🧪 Running tests to verify updates..."
          
          # Backend tests
          cd farmconnect-backend
          npm test || echo "Backend tests failed"
          
          # Frontend tests
          cd ../farmconnect-frontend
          npm test || echo "Frontend tests failed"
          
          # Build tests
          npm run build || echo "Frontend build failed"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No dependency changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Dependency changes detected"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update dependencies (${{ inputs.update_type || 'security' }})
            
            - Backend vulnerabilities: ${{ needs.security-audit.outputs.backend-vulnerabilities }}
            - Frontend vulnerabilities: ${{ needs.security-audit.outputs.frontend-vulnerabilities }}
            - Update type: ${{ inputs.update_type || 'security' }}
          title: "🔒 Dependency Updates (${{ inputs.update_type || 'security' }})"
          body: |
            ## Dependency Updates
            
            This PR contains automated dependency updates to address security vulnerabilities and keep dependencies current.
            
            ### Summary
            - **Backend vulnerabilities found**: ${{ needs.security-audit.outputs.backend-vulnerabilities }}
            - **Frontend vulnerabilities found**: ${{ needs.security-audit.outputs.frontend-vulnerabilities }}
            - **Update type**: ${{ inputs.update_type || 'security' }}
            - **Triggered by**: ${{ github.event_name }}
            
            ### Changes
            - Updated backend dependencies in `farmconnect-backend/package.json`
            - Updated frontend dependencies in `farmconnect-frontend/package.json`
            - Regenerated package-lock.json files
            
            ### Testing
            - [x] Backend tests passed
            - [x] Frontend tests passed
            - [x] Build process verified
            
            ### Security
            - [x] Security audit performed
            - [x] Vulnerabilities addressed
            
            **Note**: This PR was automatically created by GitHub Actions. Please review the changes and merge if everything looks good.
          branch: dependency-updates/${{ github.run_number }}
          delete-branch: true
          labels: |
            dependencies
            security
            automated

  # =============================================================================
  # DOCKER IMAGE SECURITY SCANNING
  # =============================================================================
  scan-docker-images:
    name: Scan Docker Images for Vulnerabilities
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./farmconnect-backend
          file: ./farmconnect-backend/Dockerfile
          tags: farmconnect-backend:scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./farmconnect-frontend
          file: ./farmconnect-frontend/Dockerfile
          tags: farmconnect-frontend:scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'farmconnect-backend:scan'
          format: 'json'
          output: 'backend-vulnerabilities.json'

      - name: Run Trivy vulnerability scanner on frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'farmconnect-frontend:scan'
          format: 'json'
          output: 'frontend-vulnerabilities.json'

      - name: Parse vulnerability reports
        run: |
          echo "## Backend Image Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          jq -r '.Results[]? | select(.Vulnerabilities) | .Vulnerabilities[] | select(.Severity == "CRITICAL" or .Severity == "HIGH") | "- **\(.Severity)**: \(.VulnerabilityID) - \(.Title)"' backend-vulnerabilities.json >> $GITHUB_STEP_SUMMARY || echo "No critical/high vulnerabilities found in backend image" >> $GITHUB_STEP_SUMMARY
          
          echo "## Frontend Image Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          jq -r '.Results[]? | select(.Vulnerabilities) | .Vulnerabilities[] | select(.Severity == "CRITICAL" or .Severity == "HIGH") | "- **\(.Severity)**: \(.VulnerabilityID) - \(.Title)"' frontend-vulnerabilities.json >> $GITHUB_STEP_SUMMARY || echo "No critical/high vulnerabilities found in frontend image" >> $GITHUB_STEP_SUMMARY

      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-vulnerability-reports
          path: |
            backend-vulnerabilities.json
            frontend-vulnerabilities.json
          retention-days: 30

      - name: Create issue for critical vulnerabilities
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read vulnerability reports
            const backendVulns = JSON.parse(fs.readFileSync('backend-vulnerabilities.json', 'utf8'));
            const frontendVulns = JSON.parse(fs.readFileSync('frontend-vulnerabilities.json', 'utf8'));
            
            // Count critical and high vulnerabilities
            let criticalCount = 0;
            let highCount = 0;
            
            [backendVulns, frontendVulns].forEach(report => {
              report.Results?.forEach(result => {
                result.Vulnerabilities?.forEach(vuln => {
                  if (vuln.Severity === 'CRITICAL') criticalCount++;
                  if (vuln.Severity === 'HIGH') highCount++;
                });
              });
            });
            
            // Create issue if critical vulnerabilities found
            if (criticalCount > 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Critical Security Vulnerabilities Found in Docker Images`,
                body: `## Security Alert
                
                Automated security scanning has detected **${criticalCount} critical** and **${highCount} high** severity vulnerabilities in our Docker images.
                
                ### Action Required
                - [ ] Review vulnerability reports in the [latest workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})
                - [ ] Update base images and dependencies
                - [ ] Test and deploy security patches
                
                ### Reports
                - Backend vulnerabilities: ${criticalCount + highCount} found
                - Frontend vulnerabilities: Check attached reports
                
                This issue was automatically created by the security scanning workflow.`,
                labels: ['security', 'critical', 'automated']
              });
            }

  # =============================================================================
  # DEPENDENCY MONITORING
  # =============================================================================
  dependency-monitoring:
    name: Dependency Monitoring Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate dependency report
        run: |
          echo "# FarmConnect Dependency Report" > dependency-report.md
          echo "Generated on: $(date)" >> dependency-report.md
          echo "" >> dependency-report.md
          
          echo "## Backend Dependencies" >> dependency-report.md
          cd farmconnect-backend
          npx npm-check --skip-unused --json > ../backend-deps.json || true
          cd ..
          
          echo "## Frontend Dependencies" >> dependency-report.md
          cd farmconnect-frontend
          npx npm-check --skip-unused --json > ../frontend-deps.json || true
          cd ..
          
          # Parse and format the reports
          node -e "
            const backendDeps = require('./backend-deps.json');
            const frontendDeps = require('./frontend-deps.json');
            
            console.log('### Backend Outdated Dependencies');
            backendDeps.packages?.filter(p => p.isOutdated).forEach(p => {
              console.log(\`- **\${p.moduleName}**: \${p.installed} → \${p.wanted} (latest: \${p.latest})\`);
            });
            
            console.log('### Frontend Outdated Dependencies');
            frontendDeps.packages?.filter(p => p.isOutdated).forEach(p => {
              console.log(\`- **\${p.moduleName}**: \${p.installed} → \${p.wanted} (latest: \${p.latest})\`);
            });
          " >> dependency-report.md

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.md
          retention-days: 30

      - name: Comment on latest commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('dependency-report.md', 'utf8');
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## 📊 Weekly Dependency Report\n\n${report}`
            });

  # =============================================================================
  # NOTIFICATION
  # =============================================================================
  notify-completion:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [security-audit, update-dependencies, scan-docker-images, dependency-monitoring]
    if: always()

    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🔒 FarmConnect Dependency Update Workflow Completed
            
            **Results:**
            - Security Audit: ${{ needs.security-audit.result }}
            - Dependency Updates: ${{ needs.update-dependencies.result }}
            - Docker Scanning: ${{ needs.scan-docker-images.result }}
            - Monitoring Report: ${{ needs.dependency-monitoring.result }}
            
            **Vulnerabilities Found:**
            - Backend: ${{ needs.security-audit.outputs.backend-vulnerabilities || 0 }}
            - Frontend: ${{ needs.security-audit.outputs.frontend-vulnerabilities || 0 }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
