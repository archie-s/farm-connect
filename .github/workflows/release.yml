name: FarmConnect CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  package:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            farmconnect-backend/package-lock.json
            farmconnect-frontend/package-lock.json

      - name: Build backend package
        working-directory: farmconnect-backend
        run: |
          npm ci
          npx prisma generate
          tar -czf ../farmconnect-backend-${{ github.sha }}.tar.gz \
            --exclude=node_modules \
            --exclude=coverage \
            .

      - name: Build frontend package
        working-directory: farmconnect-frontend
        run: |
          npm ci
          npm run build
          tar -czf ../farmconnect-frontend-dist-${{ github.sha }}.tar.gz dist

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: farmconnect-backend-${{ github.sha }}.tar.gz
          retention-days: 14

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: farmconnect-frontend-dist-${{ github.sha }}.tar.gz
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            backend-package/*.tar.gz
            frontend-dist/*.tar.gz

  deploy-webhook:
    name: Deploy via Webhook
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Trigger deployment webhook when configured
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL is not set."
            echo "Set it in repository secrets to enable one-click deploys."
            exit 0
          fi

          curl -sS -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"$DEPLOY_ENVIRONMENT\",\"sha\":\"$DEPLOY_SHA\"}"
